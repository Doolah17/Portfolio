<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Track lines -->
  <line x1="100" y1="350" x2="700" y2="350" stroke="#334155" stroke-width="2"/>
  <line x1="100" y1="310" x2="700" y2="310" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
  <line x1="100" y1="270" x2="700" y2="270" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
  <!-- Bar chart -->
  <rect x="160" y="200" width="60" height="150" rx="4" fill="url(#accent)" opacity="0.9"/>
  <rect x="260" y="160" width="60" height="190" rx="4" fill="url(#accent)" opacity="0.75"/>
  <rect x="360" y="240" width="60" height="110" rx="4" fill="url(#accent)" opacity="0.6"/>
  <rect x="460" y="130" width="60" height="220" rx="4" fill="url(#accent)" opacity="0.85"/>
  <rect x="560" y="180" width="60" height="170" rx="4" fill="url(#accent)" opacity="0.7"/>
  <!-- Runner icon -->
  <circle cx="400" cy="80" r="16" fill="#10b981"/>
  <line x1="400" y1="96" x2="400" y2="130" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="110" x2="380" y2="100" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="110" x2="420" y2="100" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="130" x2="385" y2="155" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <line x1="400" y1="130" x2="418" y2="152" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
  <!-- Title -->
  <text x="400" y="420" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18" font-weight="600">J2N x EPIC  |  Athlete Performance Analytics</text>
</svg>
