<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="acc3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)"/>
  <!-- Cloud shape -->
  <ellipse cx="400" cy="100" rx="120" ry="50" fill="none" stroke="#334155" stroke-width="2"/>
  <ellipse cx="340" cy="110" rx="60" ry="40" fill="none" stroke="#334155" stroke-width="1.5"/>
  <ellipse cx="460" cy="110" rx="60" ry="40" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="400" y="108" text-anchor="middle" fill="#06b6d4" font-family="Arial" font-size="16" font-weight="700">AZURE CLOUD</text>
  <!-- Connection lines -->
  <line x1="300" y1="150" x2="220" y2="210" stroke="url(#acc3)" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="400" y1="150" x2="400" y2="210" stroke="url(#acc3)" stroke-width="1.5" stroke-dasharray="6,3"/>
  <line x1="500" y1="150" x2="580" y2="210" stroke="url(#acc3)" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- Service boxes -->
  <rect x="160" y="210" width="120" height="60" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
  <text x="220" y="237" text-anchor="middle" fill="#10b981" font-family="Arial" font-size="11" font-weight="600">REST API</text>
  <text x="220" y="255" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="10">Swagger UI</text>
  <rect x="340" y="210" width="120" height="60" rx="8" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="400" y="237" text-anchor="middle" fill="#06b6d4" font-family="Arial" font-size="11" font-weight="600">AI / ML</text>
  <text x="400" y="255" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="10">Model Training</text>
  <rect x="520" y="210" width="120" height="60" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
  <text x="580" y="237" text-anchor="middle" fill="#10b981" font-family="Arial" font-size="11" font-weight="600">DATA LAKE</text>
  <text x="580" y="255" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="10">Blob Storage</text>
  <!-- Pipeline arrow -->
  <line x1="200" y1="310" x2="600" y2="310" stroke="#334155" stroke-width="2"/>
  <polygon points="600,305 615,310 600,315" fill="#334155"/>
  <text x="400" y="330" text-anchor="middle" fill="#475569" font-family="Arial" font-size="12">CI/CD Pipeline  —  Azure DevOps + GitHub Actions</text>
  <!-- Museum artifacts icons -->
  <rect x="250" y="350" width="80" height="60" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="290" y="385" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="24">🏛️</text>
  <rect x="360" y="350" width="80" height="60" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="400" y="385" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="24">🖼️</text>
  <rect x="470" y="350" width="80" height="60" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="510" y="385" text-anchor="middle" fill="#64748b" font-family="Arial" font-size="24">📜</text>
  <!-- Title -->
  <text x="400" y="435" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18" font-weight="600">Artifacts Canada  |  Cultural Heritage AI Platform</text>
</svg>
