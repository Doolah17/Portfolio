<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 40" fill="none">
  <!-- J -->
  <text x="8" y="27" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" font-size="18" fill="url(#gold)">J</text>
  <!-- 2 -->
  <text x="21" y="27" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" font-size="18" fill="rgba(255,255,255,0.9)">2</text>
  <!-- N -->
  <text x="33" y="27" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" font-size="18" fill="url(#gold)">N</text>

  <!-- X divider -->
  <text x="52" y="27" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="300" font-size="16" fill="rgba(255,255,255,0.9)">X</text>

  <!-- E -->
  <text x="68" y="27" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="300" font-size="20" fill="url(#gold)">E</text>

  <!-- Dot -->
  <circle cx="81" cy="25" r="1" fill="#b8860b" opacity="0.5"/>

  <!-- P -->
  <text x="85" y="27" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="300" font-size="20" fill="rgba(255,255,255,0.9)">P</text>

  <!-- Dot -->
  <circle cx="99" cy="25" r="1" fill="#b8860b" opacity="0.5"/>

  <!-- I -->
  <text x="103" y="27" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="300" font-size="20" fill="url(#gold)">I</text>

  <!-- Dot -->
  <circle cx="110" cy="25" r="1" fill="#b8860b" opacity="0.5"/>

  <!-- C -->
  <text x="114" y="27" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="300" font-size="20" fill="rgba(255,255,255,0.9)">C</text>

  <!-- Vertical divider -->
  <line x1="134" y1="10" x2="134" y2="30" stroke="#b8860b" stroke-width="0.6" opacity="0.3"/>

  <!-- LABS text -->
  <text x="140" y="20" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="400" font-size="7" fill="#b8860b" letter-spacing="2.5" opacity="0.8">LABS</text>

  <!-- Underline accent -->
  <rect x="140" y="23" width="22" height="0.5" fill="#b8860b" opacity="0.3" rx="0.25"/>

  <!-- Gradients -->
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="28">
      <stop offset="0%" stop-color="#c9961a"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
  </defs>
</svg>
